services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto_app
    working_dir: /app/backend
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/backend/storage/static
      - media_volume:/app/backend/storage/media
    ports:
      - "8000:8000"
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: auto_db
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auto_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto_celery_worker
    working_dir: /app/backend
    env_file:
      - .env
    volumes:
      - .:/app
      - media_volume:/app/backend/storage/media
    command: >
      sh -c "
        celery -A configs worker --loglevel=info
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto_celery_beat
    working_dir: /app/backend
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      sh -c "
        celery -A configs beat --loglevel=info
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: auto_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/backend/storage/static:ro
      - media_volume:/app/backend/storage/media:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:
  static_volume:
  media_volume: